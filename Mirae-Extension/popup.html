<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 280px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; margin: 0; background-color: #FAFAFA; }
    h2 { margin-top: 0; color: #14213D; font-size: 20px; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; margin: 6px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; }
    #saveBtn { background-color: #FCA311; color: #000000; box-shadow: 0 4px 6px rgba(252, 163, 17, 0.2); }
    #saveBtn:hover { background-color: #fdb748; transform: translateY(-1px); }
    #dashboardBtn { background-color: #14213D; color: #FFFFFF; }
    #dashboardBtn:hover { background-color: #1f335c; }
  </style>
</head>
<body>
  <h2>Mirae Tracker</h2>
  <button id="saveBtn">Save Job to Mirae</button>
  <button id="dashboardBtn">📊 Open Dashboard</button>
  <script src="popup.js"></script>
</body>
</html>
